services:
  vernemq1:
    image: vernemq/vernemq:2.1.2
    container_name: vernemq1.local
    hostname: vernemq1.local
    environment:
      - DOCKER_VERNEMQ_ACCEPT_EULA=yes
      - DOCKER_VERNEMQ_ALLOW_ANONYMOUS=on
      - DOCKER_VERNEMQ_NODENAME=vernemq1.local
      - DOCKER_VERNEMQ_DISCOVERY_NODE=vernemq1.local
      - DOCKER_VERNEMQ_LISTENER__TCP__ALLOWED_PROTOCOL_VERSIONS=3,4,5,131,132
      - DOCKER_VERNEMQ_LOG__CONSOLE__LEVEL=info #log.console.level = debug 
    volumes:
      - vernemq-etc:/vernemq/etc
      - vernemq-data:/vernemq/data
      - vernemq-log:/vernemq/log
    ports:
      - "1883:1883"
      - "8888:8888"   # HTTP API
      # - "8080:8080"   # WebSocket
    networks:
      - iot 

  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - iot

  grafana:
    image: grafana/grafana:13.0
    container_name: grafana
    user: '0'
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=${ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      # - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-worldmap-panel,grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ANGULAR_SUPPORT_ENABLED=True
      - GF_FEATURE_TOGGLES_ANGULARDEPRECATIONUI=False
    networks:
      - iot
    ports:
      - "3000:3000"
  
  # ==================================================================
  #  TELEGRAF COLLECTOR: ดึงข้อมูลจาก MQTT (VerneMQ) -> โยนลงฐานข้อมูล InfluxDB
  # ==================================================================
  telegraf-collector:
    image: telegraf:1.39
    container_name: telegraf-collector
    volumes:
      - ./telegraf/telegraf-collector.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - vernemq1
      - influxdb
    networks:
      - iot
    restart: unless-stopped

  # ==================================================================
  #  TELEGRAF GATEWAY: รอรับข้อมูลดิบจากเซนเซอร์ UDP -> เฉลี่ยค่า -> ยิงเข้า MQTT
  # ==================================================================
  telegraf-gateway:
    image: telegraf:1.39
    container_name: telegraf-gateway
    volumes:
      - ./telegraf/telegraf-gateway.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - vernemq1
    ports:
      - "5005:5005/udp"
    networks:
      - iot
    restart: unless-stopped

  # ==================================================================
  #  APACHE KAFKA BROKER: โครงสร้างข้อมูลสตรีมมิ่งหลักแบบ KRaft Mode
  # ==================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka_broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - iot

  # ==================================================================
  #  KAFKA CONNECT: ตัวเชื่อมและดึงข้อมูลจาก VerneMQ ข้ามฝั่งไปหา Kafka
  #  *มาพร้อมคำสั่งติดตั้ง Confluent MQTT Source Connector ทันทีเมื่อรันครั้งแรก*
  # ==================================================================
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: kafka_connect
    depends_on:
      - kafka
      - vernemq1
    ports:
      - "8083:8083" # พอร์ต REST API สำหรับตั้งค่าและตรวจสอบ Connector
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false" # ปิดการดึง Schema เพื่อไม่ให้ JSON พัง
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command: 
      - bash
      - -c
      - |
        echo "Installing Confluent MQTT Connector..."
        confluent-hub install --no-prompt confluentinc/kafka-connect-mqtt:1.7.0
        # สตาร์ทตัวระบบหลักต่อ
        /etc/confluent/docker/run
    volumes:
      - connect-plugins:/usr/share/confluent-hub-components
    networks:
      - iot

  influxdb:
    image: influxdb:2.9
    ports:
      - "8086:8086"
    volumes:
      - influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=iot_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=mytoken
    networks:
      - iot

networks:
  iot:
    driver: bridge

volumes:
  vernemq-data:
  vernemq-log:
  vernemq-etc:
  prometheus-data:
  influxdb:
  kafka-data:
  connect-plugins: